name: "Pane create and destroy"
id: t_pane_lifecycle
category: pane_management
timeout_sec: 20
terminal:
  rows: 24
  cols: 80
steps:
  - action: start
  - action: create_pane_with_probe
  - action: wait_probe_ready
    pane: 0
  - action: verify_env_check
    pane: 0
  - action: create_pane_with_probe
  - action: wait_probe_ready
    pane: 1
  - action: verify_env_check
    pane: 1
  - action: kill_pane
    pane: 1
  - action: wait
    duration_ms: 500
  - action: verify_env_check
    pane: 0

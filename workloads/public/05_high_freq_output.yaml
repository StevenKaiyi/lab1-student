name: "High frequency output stress"
id: t_high_freq_output
category: stress
timeout_sec: 15
terminal:
  rows: 24
  cols: 80
steps:
  - action: start
  - action: create_pane_with_probe
  - action: wait_probe_ready
    pane: 0
  - action: create_pane
  - action: switch_focus
    pane: 1
  - action: run_command
    command: "seq 1 10000"
    delay_ms: 2000
  - action: switch_focus
    pane: 0
  - action: verify_env_check
    pane: 0
  - action: wait
    duration_ms: 500
  - action: verify_output_token
    pane: 0

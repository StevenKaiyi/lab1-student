name: "TUI program compatibility (vim start/quit)"
id: t_tui_compat
category: io
timeout_sec: 15
terminal:
  rows: 24
  cols: 80
steps:
  - action: start
  - action: create_pane_with_probe
    session: probe_pane
  - action: wait_probe_ready
    pane: 0
  - action: verify_env_check
    pane: 0
  - action: create_pane
  - action: switch_focus
    pane: 1
  - action: run_command
    command: "vim"
    delay_ms: 1000
  - action: send_keys
    pane: 1
    keys: ":q!"
  - action: send_keys
    pane: 1
    keys: "Enter"
  - action: wait
    duration_ms: 500
  - action: switch_focus
    pane: 0
  - action: verify_env_check
    pane: 0
  - action: verify_output_token
    pane: 0

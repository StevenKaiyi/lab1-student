name: "SIGTSTP and SIGCONT delivery"
id: t_sigtstp_cont
category: signal
timeout_sec: 15
terminal:
  rows: 24
  cols: 80
steps:
  - action: start
  - action: create_pane_with_probe
  - action: wait_probe_ready
    pane: 0
  - action: verify_env_check
    pane: 0
  - action: send_keys
    pane: 0
    keys: "C-z"
  - action: wait
    duration_ms: 500
  - action: verify_signal
    pane: 0
    signal: SIGTSTP
    expect: received

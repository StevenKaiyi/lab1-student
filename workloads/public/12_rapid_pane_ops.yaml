name: "Rapid pane create/destroy cycle"
id: t_rapid_pane_ops
category: pane_management
timeout_sec: 20
terminal:
  rows: 24
  cols: 80
steps:
  - action: start
  - action: create_pane_with_probe
  - action: wait_probe_ready
    pane: 0
  - action: create_pane
  - action: wait
    duration_ms: 300
  - action: kill_pane
    pane: 1
  - action: wait
    duration_ms: 300
  - action: create_pane
  - action: wait
    duration_ms: 300
  - action: kill_pane
    pane: 2
  - action: wait
    duration_ms: 300
  - action: create_pane
  - action: wait
    duration_ms: 300
  - action: kill_pane
    pane: 3
  - action: wait
    duration_ms: 500
  - action: verify_env_check
    pane: 0
  - action: verify_input_token
    pane: 0
  - action: verify_zombie_count
    max_zombies: 0

name: "Detach and reattach basic"
id: t_detach_basic
category: session
timeout_sec: 30
terminal:
  rows: 24
  cols: 80
steps:
  - action: start
  - action: create_pane_with_probe
  - action: wait_probe_ready
    pane: 0
  - action: verify_env_check
    pane: 0
  - action: detach
  - action: verify_server_alive
  - action: reattach
  - action: wait
    duration_ms: 500
  - action: verify_input_token
    pane: 0

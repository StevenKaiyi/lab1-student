name: "Readonly client cannot send input"
id: t_multi_client_readonly
category: multi_client
timeout_sec: 20
terminal:
  rows: 24
  cols: 80
steps:
  - action: start
  - action: create_pane_with_probe
  - action: wait_probe_ready
    pane: 0
  - action: attach_client
    readonly: true
  - action: wait
    duration_ms: 500
  - action: verify_readonly_blocked
    client: 0
    pane: 0
  - action: verify_extra_client_output
    client: 0
    pane: 0

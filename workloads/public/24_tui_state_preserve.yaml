name: "TUI state preserve on pane switch (vim with edits)"
id: t_tui_state_preserve
category: tui
timeout_sec: 20
terminal:
  rows: 24
  cols: 80
steps:
  - action: start
  - action: create_pane_with_probe
    session: probe_pane
  - action: wait_probe_ready
    pane: 0
  - action: verify_env_check
    pane: 0
  # 创建测试文件
  - action: run_command
    command: "echo 'LINE ONE' > /tmp/tui_test.txt"
    delay_ms: 200
  - action: run_command
    command: "echo 'LINE TWO' >> /tmp/tui_test.txt"
    delay_ms: 200
  - action: run_command
    command: "echo 'LINE THREE' >> /tmp/tui_test.txt"
    delay_ms: 200
  # 创建第二个 pane
  - action: create_pane
  - action: switch_focus
    pane: 0
  # 在 pane 0 中启动 vim
  - action: run_command
    command: "vim /tmp/tui_test.txt"
    delay_ms: 1000
  # 在 vim 中执行编辑操作
  - action: send_keys
    pane: 0
    keys: ":"
    delay_ms: 200
  - action: send_keys
    pane: 0
    keys: "w"
    delay_ms: 200
  - action: send_keys
    pane: 0
    keys: "!"
    delay_ms: 200
  - action: send_keys
    pane: 0
    keys: "Enter"
    delay_ms: 300
  # 移动到第二行并添加标记
  - action: send_keys
    pane: 0
    keys: "j"
    delay_ms: 200
  - action: send_keys
    pane: 0
    keys: "i"
    delay_ms: 200
  - action: send_keys
    pane: 0
    keys: "MARKED"
    delay_ms: 200
  - action: send_keys
    pane: 0
    keys: "Escape"
    delay_ms: 200
  # 保存修改
  - action: send_keys
    pane: 0
    keys: ":"
    delay_ms: 200
  - action: send_keys
    pane: 0
    keys: "w"
    delay_ms: 200
  - action: send_keys
    pane: 0
    keys: "Enter"
    delay_ms: 300
  # 切换到 pane 1
  - action: switch_focus
    pane: 1
  - action: wait
    duration_ms: 300
  # 在 pane 1 中执行命令
  - action: run_command
    command: "echo 'PANE1_WORKING' > /dev/null"
    delay_ms: 200
  - action: run_command
    command: "date"
    delay_ms: 200
  # 等待一段时间，模拟在 pane 1 中工作
  - action: wait
    duration_ms: 500
  # 切回 pane 0
  - action: switch_focus
    pane: 0
  - action: wait
    duration_ms: 300
  # 退出 vim
  - action: send_keys
    pane: 0
    keys: ":"
    delay_ms: 200
  - action: send_keys
    pane: 0
    keys: "q"
    delay_ms: 200
  - action: send_keys
    pane: 0
    keys: "Enter"
    delay_ms: 300
  # 检查文件内容是否包含标记
  - action: run_command
    command: "cat /tmp/tui_test.txt | grep -q MARKED && echo 'TUI_STATE_OK'"
    delay_ms: 200
  - action: verify_output_token
    pane: 0
  # 清理
  - action: run_command
    command: "rm -f /tmp/tui_test.txt"
    delay_ms: 200
